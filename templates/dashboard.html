<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Analytics Dashboard</title>
  <!-- Link to CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div>
        <h1>Analytics</h1>
        <p class="subtitle">Service health trends and performance metrics</p>
      </div>
      <div class="range-buttons">
        <button class="active">7d</button>
        <button>24h</button>
      </div>
    </div>

    <!-- KPI Cards -->
    <div class="grid grid-4" id="kpi-cards"></div>

    <!-- Service Filter -->
    <div class="service-filter" id="service-filter"></div>

    <!-- Charts -->
    <div class="grid grid-3">
      <div class="card" style="grid-column: span 2;">
        <h2>Uptime % — Last 7 Days</h2>
        <canvas id="uptime-chart" height="200"></canvas>
      </div>
      <div class="card">
        <h2>Status Distribution</h2>
        <canvas id="status-chart" height="200"></canvas>
      </div>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <h2>Response Time (ms) — Today</h2>
        <canvas id="response-chart" height="200"></canvas>
      </div>
      <div class="card">
        <h2>Incidents — Last 7 Days</h2>
        <canvas id="incident-chart" height="200"></canvas>
      </div>
    </div>

    <!-- Service Summary Table -->
    <div class="card">
      <h2>Service Performance Summary</h2>
      <table>
        <thead>
          <tr>
            <th>Service</th>
            <th>Uptime</th>
            <th>Avg Response</th>
            <th>Incidents</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="service-summary"></tbody>
      </table>
    </div>
  </div>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Link to JS -->
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>

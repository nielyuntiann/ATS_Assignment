version: "3.9"

services:
  mock-services:
    build:
      context: .
      dockerfile: Dockerfile.mock
    container_name: mock-services
    ports:
      - "4000:4000"
      - "5000:5000"

  app:
    build:
      context: .
      dockerfile: Dockerfile.main
    container_name: dashboard-app
    ports:
      - "8000:8000"
    depends_on:
      mock-services:
        condition: service_healthy
